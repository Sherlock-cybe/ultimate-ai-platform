# ═══════════════════════════════════════════════════
# ULTIMATE AI PLATFORM — Development Docker Compose
# For development: only external services in Docker
# Spring Boot runs directly for fast restart
# ═══════════════════════════════════════════════════

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ultimate-postgres-dev
    environment:
      POSTGRES_DB: ultimate
      POSTGRES_USER: ultimate
      POSTGRES_PASSWORD: ultimate
    ports:
      - "5433:5432"
    volumes:
      - ultimate-postgres-dev-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ultimate-redis-dev
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ultimate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ultimate.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  ultimate-postgres-dev-data:
  
