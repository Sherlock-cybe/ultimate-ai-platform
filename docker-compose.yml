# ═══════════════════════════════════════════════════
# ULTIMATE AI PLATFORM — Production-like Local Docker Compose
# ═══════════════════════════════════════════════════

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ultimate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ultimate
      POSTGRES_USER: ultimate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ultimate}
    ports:
      - "5433:5432"
    volumes:
      - ultimate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ultimate -d ultimate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ultimate-network

  redis:
    image: redis:7-alpine
    container_name: ultimate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ultimate-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ultimate-network

volumes:
  ultimate-postgres-data:
    driver: local
  ultimate-redis-data:
    driver: local

networks:
  ultimate-network:
    driver: bridge
    name: ultimate-network
    
